name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: build and zip
        run: ./build.sh "${{ steps.v.outputs.version }}"
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: build/noMail-${{ steps.v.outputs.version }}.zip
          generate_release_notes: true

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: trigger cask update in tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_PAT not set — skipping cask auto-bump (bump it manually)."
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          gh workflow run update-cask.yml \
            --repo gosantos/homebrew-no-mail \
            --ref main \
            -f version="$version"
